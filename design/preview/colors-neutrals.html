<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Neutral palette</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#f8fafc;}
.frame{box-sizing:border-box;width:700px;min-height:200px;padding:24px;display:flex;flex-direction:column;justify-content:center;}
.row{display:flex;gap:16px;align-items:stretch;flex-wrap:wrap;}
.swatch{flex:1;min-width:60px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:11px;color:#1e293b;font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.swatch.dark{color:#fff;}
.tok{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;opacity:.85;}
.legend{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
.mini-card{background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.05);padding:16px;}
</style></head><body><div class="frame">
<div class="legend">Slate scale — surfaces, text, dividers</div>
<div class="row" style="margin-top:8px;">
  <div class="swatch " style="background:#f8fafc;min-height:64px;"><div class="tok">#f8fafc</div><div>bg-app</div></div>
  <div class="swatch " style="background:#ffffff;min-height:64px;"><div class="tok">#ffffff</div><div>surface</div></div>
  <div class="swatch " style="background:#f1f5f9;min-height:64px;"><div class="tok">#f1f5f9</div><div>divider</div></div>
  <div class="swatch " style="background:#e2e8f0;min-height:64px;"><div class="tok">#e2e8f0</div><div>border</div></div>
  <div class="swatch " style="background:#cbd5e1;min-height:64px;"><div class="tok">#cbd5e1</div><div>scrollbar</div></div>
  <div class="swatch dark" style="background:#94a3b8;min-height:64px;"><div class="tok">#94a3b8</div><div>fg-faint</div></div>
  <div class="swatch dark" style="background:#64748b;min-height:64px;"><div class="tok">#64748b</div><div>fg-muted</div></div>
  <div class="swatch dark" style="background:#334155;min-height:64px;"><div class="tok">#334155</div><div>fg</div></div>
  <div class="swatch dark" style="background:#1e293b;min-height:64px;"><div class="tok">#1e293b</div><div>fg-strong</div></div>
</div>
</div></body></html>
