<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Elevation</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#f8fafc;}
.frame{box-sizing:border-box;width:700px;min-height:200px;padding:24px;display:flex;flex-direction:column;justify-content:center;}
.row{display:flex;gap:16px;align-items:stretch;flex-wrap:wrap;}
.swatch{flex:1;min-width:60px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:11px;color:#1e293b;font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.swatch.dark{color:#fff;}
.tok{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;opacity:.85;}
.legend{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
.mini-card{background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.05);padding:16px;}
</style></head><body><div class="frame">
<div class="legend">Two shadows: at-rest and hover-lift</div>
<div style="display:flex;gap:32px;margin-top:12px;justify-content:center;padding:12px;">
  <div style="text-align:center;">
    <div style="width:140px;height:80px;background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.05);"></div>
    <div class="egkc-caveat" style="margin-top:8px;">shadow-sm · at rest</div>
  </div>
  <div style="text-align:center;">
    <div style="width:140px;height:80px;background:#fff;border-radius:12px;box-shadow:0 10px 20px rgba(0,0,0,.05);transform:translateY(-2px);"></div>
    <div class="egkc-caveat" style="margin-top:8px;">shadow-lift · on hover</div>
  </div>
</div>
</div></body></html>
