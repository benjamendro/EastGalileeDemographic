<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Segmented metric toggles</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#f8fafc;}
.frame{box-sizing:border-box;width:700px;min-height:220px;padding:24px;display:flex;flex-direction:column;justify-content:center;}
.legend{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
.seg-toggle{display:inline-flex;background:#f1f5f9;border-radius:6px;padding:2px;}
.seg-toggle button{padding:4px 12px;font-size:12px;border-radius:4px;color:#64748b;font-weight:500;border:0;background:transparent;cursor:pointer;}
.seg-toggle button.active{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.1);color:#18a8c0;font-weight:700;}
</style></head><body><div class="frame">
<div class="legend">In-card metric switches — flip scope or unit without leaving the chart</div>
<div style="display:flex;flex-direction:column;gap:16px;margin-top:10px;">
  <div style="display:flex;gap:12px;align-items:center;">
    <span style="font-size:12px;color:#64748b;width:80px;">Scope:</span>
    <div class="seg-toggle"><button class="active">מועצות</button><button>יישובים</button></div>
  </div>
  <div style="display:flex;gap:12px;align-items:center;">
    <span style="font-size:12px;color:#64748b;width:80px;">Unit:</span>
    <div class="seg-toggle"><button class="active">%</button><button>מספר</button></div>
  </div>
  <div style="display:flex;gap:12px;align-items:center;">
    <span style="font-size:12px;color:#64748b;width:80px;">Detail:</span>
    <div class="seg-toggle"><button class="active">כללי</button><button>מפורט</button></div>
  </div>
</div>
</div></body></html>
