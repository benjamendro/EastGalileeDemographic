<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Drill-down modal</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#f8fafc;}
.frame{box-sizing:border-box;width:700px;min-height:320px;padding:24px;display:flex;flex-direction:column;justify-content:center;}
.legend{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
.seg-toggle{display:inline-flex;background:#f1f5f9;border-radius:6px;padding:2px;}
.seg-toggle button{padding:4px 12px;font-size:12px;border-radius:4px;color:#64748b;font-weight:500;border:0;background:transparent;cursor:pointer;}
.seg-toggle button.active{background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.1);color:#18a8c0;font-weight:700;}
</style></head><body><div class="frame">
<div class="legend">Opens on slice/bar click — lists the underlying settlements, sorted by population</div>
<div style="display:flex;justify-content:center;margin-top:8px;">
  <div class="egkc-card" style="width:340px;padding:0;overflow:hidden;">
    <div style="background:#18a8c0;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;">
      <span style="font-weight:700;">קיבוץ · 24 יישובים</span><span style="font-size:18px;">✕</span>
    </div>
    <ul style="margin:0;padding:14px 16px;list-style:none;font-size:13px;color:#334155;">
      <li style="display:flex;justify-content:space-between;border-bottom:1px solid #f1f5f9;padding:4px 0;"><span>דפנה</span><span style="color:#64748b;font-variant-numeric:tabular-nums;">1,029</span></li><li style="display:flex;justify-content:space-between;border-bottom:1px solid #f1f5f9;padding:4px 0;"><span>הגושרים</span><span style="color:#64748b;font-variant-numeric:tabular-nums;">1,254</span></li><li style="display:flex;justify-content:space-between;border-bottom:1px solid #f1f5f9;padding:4px 0;"><span>שדה נחמיה</span><span style="color:#64748b;font-variant-numeric:tabular-nums;">1,167</span></li><li style="display:flex;justify-content:space-between;border-bottom:1px solid #f1f5f9;padding:4px 0;"><span>איילת השחר</span><span style="color:#64748b;font-variant-numeric:tabular-nums;">1,142</span></li><li style="display:flex;justify-content:space-between;border-bottom:1px solid #f1f5f9;padding:4px 0;"><span>כפר בלום</span><span style="color:#64748b;font-variant-numeric:tabular-nums;">945</span></li>
    </ul>
  </div>
</div>
</div></body></html>
