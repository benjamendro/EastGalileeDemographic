<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Spacing scale</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#f8fafc;}
.frame{box-sizing:border-box;width:700px;min-height:220px;padding:24px;display:flex;flex-direction:column;justify-content:center;}
.row{display:flex;gap:16px;align-items:stretch;flex-wrap:wrap;}
.swatch{flex:1;min-width:60px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:11px;color:#1e293b;font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.swatch.dark{color:#fff;}
.tok{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;opacity:.85;}
.legend{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
</style></head><body><div class="frame">
<div class="legend">Tailwind's 4px scale. These are the values the system actually uses.</div>
<div style="display:flex;flex-direction:column;gap:6px;margin-top:10px;">
  
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:16px;height:14px;background:#18a8c0;border-radius:2px;"></div>
      <div style="font-family:ui-monospace,Menlo,monospace;font-size:11px;width:60px;color:#334155;">p-4 · 16px</div>
      <div class="egkc-caveat">filter stack inner padding</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:24px;height:14px;background:#18a8c0;border-radius:2px;"></div>
      <div style="font-family:ui-monospace,Menlo,monospace;font-size:11px;width:60px;color:#334155;">p-6 · 24px</div>
      <div class="egkc-caveat">card padding · section gap</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:12px;height:14px;background:#18a8c0;border-radius:2px;"></div>
      <div style="font-family:ui-monospace,Menlo,monospace;font-size:11px;width:60px;color:#334155;">p-3 · 12px</div>
      <div class="egkc-caveat">filter blocks gap</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:16px;height:14px;background:#18a8c0;border-radius:2px;"></div>
      <div style="font-family:ui-monospace,Menlo,monospace;font-size:11px;width:60px;color:#334155;">p-4 · 16px</div>
      <div class="egkc-caveat">chart grid gap</div>
    </div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:32px;height:14px;background:#18a8c0;border-radius:2px;"></div>
      <div style="font-family:ui-monospace,Menlo,monospace;font-size:11px;width:60px;color:#334155;">p-8 · 32px</div>
      <div class="egkc-caveat">content max-w-7xl outer breathing</div>
    </div>
</div>
</div></body></html>
