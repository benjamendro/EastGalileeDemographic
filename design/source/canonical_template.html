<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{DIR}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root { --accent: {{ACCENT_COLOR}}; }
        body { font-family: 'Heebo', sans-serif; background-color: #f8fafc; }
        .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .table-container::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        .table-container::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .tab-active { border-bottom: 2px solid var(--accent); color: var(--accent); font-weight: 700; }
        .tab-inactive { color: #64748b; }
        .tab-inactive:hover { color: #334155; }
        .chart-card { background-color: #ffffff; border-radius: 0.75rem; box-shadow: 0 1px 2px rgba(0,0,0,0.05); padding: 1.25rem; }
        .kpi-card { min-width: 140px; padding: 1rem; border-radius: 0.5rem; text-align: center; }
        [dir="rtl"] .border-accent-edge { border-right: 4px solid var(--accent); }
        [dir="ltr"] .border-accent-edge { border-left: 4px solid var(--accent); }
        input[type="text"], select { direction: inherit; }
    </style>
</head>
<body class="text-slate-800 flex flex-col min-h-screen">

    <div class="max-w-7xl mx-auto p-4 md:p-6 space-y-6 flex-grow w-full">

        <header class="bg-white rounded-xl shadow-sm p-6 border-accent-edge flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                {{LOGO_BLOCK}}
                <div>
                    <h1 class="text-3xl font-black text-slate-800">{{TITLE}}</h1>
                    <p class="text-slate-500 mt-1">{{SUBTITLE}}</p>
                </div>
            </div>
            <div id="kpi-row" class="flex gap-4 flex-wrap">
                {{KPI_BLOCKS}}
            </div>
        </header>

        <section class="bg-white rounded-xl shadow-sm p-6">
            <div class="flex flex-col md:flex-row gap-6">
                <aside class="w-full md:w-1/4 space-y-4 md:border-l md:pl-4 border-slate-100">
                    <h3 class="font-bold text-lg text-slate-700">סינון</h3>
                    <div id="filter-blocks" class="space-y-3">
                        {{FILTER_BLOCKS}}
                    </div>
                    <button id="reset-filters" class="text-xs hover:underline mt-2" style="color: var(--accent);">איפוס סינונים</button>
                    <div class="pt-4 border-t border-slate-100 text-xs text-slate-500">
                        <span id="row-count-label">תצפיות מוצגות: </span><span id="row-count-value" class="font-bold">0</span>
                    </div>
                </aside>
                <div class="w-full md:w-3/4 grid grid-cols-1 lg:grid-cols-12 gap-4" id="chart-grid">
                    {{CHART_BLOCKS}}
                </div>
            </div>
        </section>

        <section class="chart-card">
            <div class="flex justify-between items-center mb-4 flex-wrap gap-2">
                <div id="table-tabs" class="flex gap-4 border-b border-slate-100 flex-grow">
                    {{TABLE_TABS}}
                </div>
                <input type="text" id="table-search" placeholder="חיפוש..." class="border border-slate-200 rounded px-3 py-1 text-sm w-64 focus:outline-none focus:border-slate-400">
            </div>
            <div class="overflow-auto table-container max-h-[500px]">
                <table class="w-full text-sm text-right">
                    <thead class="sticky top-0 bg-slate-50 text-slate-600 font-semibold">
                        <tr id="table-head-row">{{TABLE_HEADERS}}</tr>
                    </thead>
                    <tbody id="data-table-body" class="divide-y divide-slate-100"></tbody>
                </table>
            </div>
        </section>

        <footer class="text-center p-6 text-slate-400 text-xs">
            {{DATA_SOURCE}}
        </footer>
    </div>

    <script id="dashboard-data" type="application/json">{{DATA_JSON}}</script>
    <script id="dashboard-config" type="application/json">{{CONFIG_JSON}}</script>

    <script>
    // -- Runtime -----------------------------------------------------------------
    {{RUNTIME_JS}}
    </script>

    <script>
    // -- Custom chart definitions (from config.charts[type=custom]) -------------
    {{CUSTOM_JS}}
    </script>

    <script>
    // -- Bootstrap --------------------------------------------------------------
    document.addEventListener("DOMContentLoaded", function () {
        window.dashboard.init();
    });
    </script>
</body>
</html>
