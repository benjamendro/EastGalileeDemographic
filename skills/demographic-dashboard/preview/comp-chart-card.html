<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Chart card</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#f8fafc;}
.frame{box-sizing:border-box;width:700px;min-height:300px;padding:24px;display:flex;flex-direction:column;justify-content:center;}
.row{display:flex;gap:16px;align-items:stretch;flex-wrap:wrap;}
.swatch{flex:1;min-width:60px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:11px;color:#1e293b;font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.swatch.dark{color:#fff;}
.tok{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;opacity:.85;}
.legend{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
</style></head><body><div class="frame">
<div class="egkc-card egkc-card-hover">
  <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px;">
    <div class="egkc-h2">אוכלוסייה לפי מגזר</div>
    <div class="egkc-caveat">ממוצע משוקלל · מוי׳ץ 2024</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px;direction:rtl;">
    
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:90px;font-size:13px;color:#334155;">יהודי</div>
        <div style="height:18px;background:#18a8c0;width:92%;border-radius:3px;"></div>
        <div style="font-size:12px;color:#64748b;font-variant-numeric:tabular-nums;">168,728</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:90px;font-size:13px;color:#334155;">ערבי</div>
        <div style="height:18px;background:#903078;width:54%;border-radius:3px;"></div>
        <div style="font-size:12px;color:#64748b;font-variant-numeric:tabular-nums;">99,036</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:90px;font-size:13px;color:#334155;">דרוזי</div>
        <div style="height:18px;background:#1878a8;width:27%;border-radius:3px;"></div>
        <div style="font-size:12px;color:#64748b;font-variant-numeric:tabular-nums;">49,518</div>
      </div>
    
      <div style="display:flex;align-items:center;gap:10px;">
        <div style="width:90px;font-size:13px;color:#334155;">בדואי</div>
        <div style="height:18px;background:#90c048;width:18%;border-radius:3px;"></div>
        <div style="font-size:12px;color:#64748b;font-variant-numeric:tabular-nums;">33,012</div>
      </div>
    
  </div>
</div>
</div></body></html>
