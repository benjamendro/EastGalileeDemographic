<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Accent family</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#f8fafc;}
.frame{box-sizing:border-box;width:700px;min-height:230px;padding:24px;display:flex;flex-direction:column;justify-content:center;}
.row{display:flex;gap:16px;align-items:stretch;flex-wrap:wrap;}
.swatch{flex:1;min-width:60px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:11px;color:#1e293b;font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.swatch.dark{color:#fff;}
.tok{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;opacity:.85;}
.legend{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
</style></head><body><div class="frame">
<div class="legend">One accent per dashboard. All 6 are mosaic-derived from the brand logo.</div>
<div class="row" style="margin-top:8px;">
  <div class="swatch dark" style="background:#18a8c0;min-height:90px;"><div class="tok">#18a8c0</div><div>cyan (default)<br><span style="opacity:.75;font-weight:400;">data / general</span></div></div>
  <div class="swatch dark" style="background:#183048;min-height:90px;"><div class="tok">#183048</div><div>navy<br><span style="opacity:.75;font-weight:400;">policy</span></div></div>
  <div class="swatch dark" style="background:#1878a8;min-height:90px;"><div class="tok">#1878a8</div><div>blue<br><span style="opacity:.75;font-weight:400;">education</span></div></div>
  <div class="swatch dark" style="background:#90c048;min-height:90px;"><div class="tok">#90c048</div><div>lime<br><span style="opacity:.75;font-weight:400;">environment</span></div></div>
  <div class="swatch dark" style="background:#c0a860;min-height:90px;"><div class="tok">#c0a860</div><div>gold<br><span style="opacity:.75;font-weight:400;">tourism</span></div></div>
  <div class="swatch dark" style="background:#903078;min-height:90px;"><div class="tok">#903078</div><div>magenta<br><span style="opacity:.75;font-weight:400;">equity / welfare</span></div></div>
</div>
</div></body></html>
