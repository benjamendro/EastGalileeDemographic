<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Dashboard header</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#f8fafc;}
.frame{box-sizing:border-box;width:700px;min-height:220px;padding:24px;display:flex;flex-direction:column;justify-content:center;}
.row{display:flex;gap:16px;align-items:stretch;flex-wrap:wrap;}
.swatch{flex:1;min-width:60px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:11px;color:#1e293b;font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.swatch.dark{color:#fff;}
.tok{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;opacity:.85;}
.legend{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
</style></head><body><div class="frame">
<div class="egkc-card egkc-border-accent-edge" style="padding:20px;display:flex;align-items:center;justify-content:space-between;gap:16px;">
  <div style="display:flex;align-items:center;gap:14px;">
    <img src="../assets/mark.png" alt="" style="height:56px;">
    <div>
      <div class="egkc-h1" style="font-size:22px;color:#183048;">דשבורד דמוגרפי גליל מזרחי</div>
      <div class="egkc-subtitle" style="font-size:13px;">מערכת ניתוח דמוגרפי וכלכלי לאשכול</div>
    </div>
  </div>
  <div style="display:flex;gap:10px;">
    <div class="egkc-kpi-card egkc-kpi-tinted" style="min-width:110px;padding:10px 14px;">
      <div class="egkc-kpi-numeral" style="font-size:22px;">38</div>
      <div class="egkc-kpi-label">רשויות</div>
    </div>
    <div class="egkc-kpi-card" style="min-width:110px;padding:10px 14px;">
      <div class="egkc-kpi-numeral" style="font-size:22px;color:#475569;">214,317</div>
      <div class="egkc-kpi-label">תושבים</div>
    </div>
  </div>
</div>
</div></body></html>
