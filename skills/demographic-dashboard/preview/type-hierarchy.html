<!doctype html><html lang="he" dir="rtl"><head><meta charset="utf-8"><title>Hierarchy ladder</title><link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0;padding:0;background:#f8fafc;}
.frame{box-sizing:border-box;width:700px;min-height:320px;padding:24px;display:flex;flex-direction:column;justify-content:center;}
.row{display:flex;gap:16px;align-items:stretch;flex-wrap:wrap;}
.swatch{flex:1;min-width:60px;border-radius:8px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px 10px;font-size:11px;color:#1e293b;font-weight:500;box-shadow:0 1px 2px rgba(0,0,0,.04);}
.swatch.dark{color:#fff;}
.tok{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:10px;opacity:.85;}
.legend{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
.mini-card{background:#fff;border-radius:12px;box-shadow:0 1px 2px rgba(0,0,0,.05);padding:16px;}
</style></head><body><div class="frame">
<div style="display:flex;flex-direction:column;gap:10px;">
  <div><span class="legend" style="display:inline-block;width:120px;">H1 / title</span><span class="egkc-h1" style="font-size:28px;">דשבורד תעסוקה</span></div>
  <div><span class="legend" style="display:inline-block;width:120px;">H2 / section</span><span class="egkc-h2">תעסוקה לפי מגזר</span></div>
  <div><span class="legend" style="display:inline-block;width:120px;">H3 / sub-head</span><span class="egkc-h3">מוסדות באשכול</span></div>
  <div><span class="legend" style="display:inline-block;width:120px;">Subtitle</span><span class="egkc-subtitle">מערכת ניתוח דמוגרפי וכלכלי</span></div>
  <div><span class="legend" style="display:inline-block;width:120px;">Label</span><span class="egkc-label">רשות מוניציפלית</span></div>
  <div><span class="legend" style="display:inline-block;width:120px;">Body</span><span class="egkc-body">מציג נתוני מתמטיקה ברמת 5 יח״ל.</span></div>
  <div><span class="legend" style="display:inline-block;width:120px;">Caveat</span><span class="egkc-caveat">לא מוצגים מוסדות עם פחות מ-11 נבחנים.</span></div>
  <div><span class="legend" style="display:inline-block;width:120px;">Footer</span><span class="egkc-footer-attr">מקור: הלמ״ס, 2023.</span></div>
</div>
</div></body></html>
